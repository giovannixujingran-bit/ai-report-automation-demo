<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图案报告模板</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft YaHei", sans-serif;
      background: #f4f2ee;
      color: #202020;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
    }

    section {
      max-width: 720px;
      padding: 40px;
      background: #fff;
      border: 1px solid #e5ded4;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
    }

    p {
      margin: 0;
      line-height: 1.8;
      color: #4d4d4d;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>图案报告模板</h1>
      <p>公开演示版移除了真实图案案例、品牌链接和业务数据，仅保留模板接入位置，方便展示系统的扩展能力。</p>
    </section>
  </main>
</body>
</html>
