<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>细节工艺报告模板</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft YaHei", sans-serif;
      background: #f7f6f3;
      color: #202020;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
    }

    section {
      max-width: 720px;
      padding: 40px;
      background: #fff;
      border: 1px solid #e8e4dc;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
    }

    p {
      margin: 0;
      line-height: 1.8;
      color: #4d4d4d;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>细节工艺报告模板</h1>
      <p>公开版已去除内部样例数据与外部素材链接。当前文件保留为演示占位，说明系统支持按报告类型切换不同页面模板。</p>
    </section>
  </main>
</body>
</html>
