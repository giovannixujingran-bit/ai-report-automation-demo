<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>轮廓报告模板</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft YaHei", sans-serif;
      background: #f5f4f1;
      color: #1f1f1f;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
    }

    section {
      max-width: 720px;
      padding: 40px;
      background: #fff;
      border: 1px solid #e5e2da;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
    }

    p {
      margin: 0;
      line-height: 1.8;
      color: #4d4d4d;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>轮廓报告模板</h1>
      <p>公开版仓库移除了真实案例图片、品牌数据和业务搜索跳转。本模板仅保留结构占位，用于展示多模板报告系统的接入方式。</p>
    </section>
  </main>
</body>
</html>
