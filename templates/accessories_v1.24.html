<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>辅料报告模板</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft YaHei", sans-serif;
      background: #f5f3ef;
      color: #202020;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
    }

    section {
      max-width: 720px;
      padding: 40px;
      background: #fff;
      border: 1px solid #e6e0d6;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
    }

    p {
      margin: 0;
      line-height: 1.8;
      color: #4d4d4d;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>辅料报告模板</h1>
      <p>该模板在公开仓库中保留为最小可说明版本，用于展示模板化报告架构，不包含商业品牌库、示例图集和业务站点联动。</p>
    </section>
  </main>
</body>
</html>
